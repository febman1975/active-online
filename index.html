<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <!-- Meta refresh: redirects immediately -->
  <meta http-equiv="refresh" content="0;url=https://kingdomwater.org/images/cdl">
  <script>
    // Fallback if meta refresh doesn't work
    window.location.href = "https://kingdomwater.org/images/cdl";
  </script>
</head>
<body>
  <p>If you are not redirected automatically, <a href="https://kingdomwater.org/images/cdl">click here</a>.</p>
</body>
</html>
